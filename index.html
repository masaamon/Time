<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeCheck — เวลาปัจจุบัน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c10;
      --surface:  #12141a;
      --border:   #1e2130;
      --amber:    #f5a623;
      --amber-dim:#9b6610;
      --white:    #e8e8e6;
      --muted:    #5a5e72;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Chakra Petch', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* ── header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 8px var(--amber);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* ── big time ── */
    .time-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 22vw, 10rem);
      line-height: 1;
      letter-spacing: .02em;
      color: var(--white);
      text-align: center;
      position: relative;
      margin-bottom: .25rem;
      /* subtle glow */
      text-shadow: 0 0 60px rgba(245,166,35,.12);
    }

    .time-display .colon {
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: var(--amber);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .15; }
    }

    /* ── seconds bar ── */
    .seconds-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2.5rem;
    }
    .seconds-label {
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .seconds-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .seconds-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 2px;
      transition: width .95s linear;
      box-shadow: 0 0 10px var(--amber-dim);
    }
    .seconds-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--amber);
      width: 2.2ch;
      text-align: right;
    }

    /* ── info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr 1px 1fr;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .divider-v {
      background: var(--border);
    }
    .info-cell {
      padding: 1.25rem 1.2rem;
    }
    .info-label {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .info-value {
      font-size: .95rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }
    .info-value.accent { color: var(--amber); }

    /* ── world clocks ── */
    .world-title {
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .75rem;
    }
    .world-clocks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
    }
    .world-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .85rem 1rem;
    }
    .world-city {
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .25rem;
    }
    .world-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.55rem;
      letter-spacing: .04em;
      color: var(--white);
    }
    .world-date {
      font-size: .6rem;
      color: var(--muted);
      margin-top: .1rem;
    }

    /* ── footer ── */
    .footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .info-grid { grid-template-columns: 1fr; }
      .divider-v { height: 1px; width: 100%; }
      .world-clocks { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">TimeCheck &mdash; Real-time Clock</span>
      <div class="status-dot"></div>
    </div>

    <div class="time-display" id="timeDisplay">
      00<span class="colon">:</span>00
    </div>

    <div class="seconds-row">
      <span class="seconds-label">วินาที</span>
      <div class="seconds-track">
        <div class="seconds-fill" id="secFill" style="width:0%"></div>
      </div>
      <span class="seconds-num" id="secNum">00</span>
    </div>

    <div class="info-grid">
      <div class="info-cell">
        <div class="info-label">วันที่</div>
        <div class="info-value" id="dateVal">—</div>
      </div>
      <div class="divider-v"></div>
      <div class="info-cell">
        <div class="info-label">วันในสัปดาห์</div>
        <div class="info-value accent" id="dayVal">—</div>
      </div>
      <div class="divider-v"></div>
      <div class="info-cell">
        <div class="info-label">เขตเวลา</div>
        <div class="info-value" id="tzVal">—</div>
      </div>
    </div>

    <div class="world-title">เวลาโลก</div>
    <div class="world-clocks" id="worldClocks"></div>

    <div class="footer" id="footer">กำลังโหลด&hellip;</div>
  </div>

  <script>
    const cities = [
      { label: 'Bangkok',  tz: 'Asia/Bangkok' },
      { label: 'Tokyo',    tz: 'Asia/Tokyo'   },
      { label: 'London',   tz: 'Europe/London' },
      { label: 'New York', tz: 'America/New_York' },
      { label: 'Dubai',    tz: 'Asia/Dubai'   },
      { label: 'Sydney',   tz: 'Australia/Sydney' },
    ];

    const thDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

    const pad = n => String(n).padStart(2, '0');

    function buildWorldClocks() {
      const container = document.getElementById('worldClocks');
      container.innerHTML = '';
      cities.forEach(c => {
        const div = document.createElement('div');
        div.className = 'world-item';
        div.innerHTML = `
          <div class="world-city">${c.label}</div>
          <div class="world-time" data-tz="${c.tz}">—</div>
          <div class="world-date" data-tzd="${c.tz}">—</div>
        `;
        container.appendChild(div);
      });
    }

    function tick() {
      const now = new Date();

      // Main time
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = now.getSeconds();
      document.getElementById('timeDisplay').innerHTML =
        `${h}<span class="colon">:</span>${m}`;

      // Seconds bar
      document.getElementById('secFill').style.width = `${(s / 59) * 100}%`;
      document.getElementById('secNum').textContent = pad(s);

      // Date & day
      const day   = now.getDate();
      const month = now.getMonth() + 1;
      const year  = now.getFullYear();
      document.getElementById('dateVal').textContent = `${day}/${pad(month)}/${year}`;
      document.getElementById('dayVal').textContent  = thDays[now.getDay()];

      // Timezone
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const offset = -now.getTimezoneOffset();
      const sign   = offset >= 0 ? '+' : '-';
      const oh = pad(Math.floor(Math.abs(offset) / 60));
      const om = pad(Math.abs(offset) % 60);
      document.getElementById('tzVal').textContent = `UTC${sign}${oh}:${om}`;

      // Footer
      document.getElementById('footer').textContent =
        `อัปเดตล่าสุด ${h}:${pad(m)}:${pad(s)}`;

      // World clocks
      document.querySelectorAll('[data-tz]').forEach(el => {
        const tzName = el.getAttribute('data-tz');
        const t = new Intl.DateTimeFormat('en-GB', {
          hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tzName
        }).format(now);
        el.textContent = t;
      });
      document.querySelectorAll('[data-tzd]').forEach(el => {
        const tzName = el.getAttribute('data-tzd');
        const d = new Intl.DateTimeFormat('en-GB', {
          day: '2-digit', month: 'short', timeZone: tzName
        }).format(now);
        el.textContent = d;
      });
    }

    buildWorldClocks();
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
