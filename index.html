            const [inventoryStatus, setInventoryStatus] = useState(() => {
                const saved = localStorage.getItem('labInventoryStatus');
                return saved ? JSON.parse(saved) : {};
            });

            // บันทึกลง LocalStorage เมื่อมีการเปลี่ยนแปลงสถานะไอเทม
            useEffect(() => {

            }, [inventoryStatus]);

                            const times = snapshot.docs.map(doc => ({

                                ...doc.data()
                            }));
                            setBusytimes(times);
                            setIsLoading(false);
                        });
                        return () => unsubscribe();
                    }
                }, 100);
            }, []);

                setModalData({ ...modalData, day: day, start: hour, end: hour + 1, note: '' });
                setErrorMsg('');
                setIsModalOpen(true);
            };

            // แก้บั๊กเวลาเริ่มต้น หากผู้ใช้เลือกเวลาเริ่ม > เวลาสิ้นสุด ให้ปัดเวลาสิ้นสุดขึ้นอัตโนมัติ
            const handleStartChange = (e) => {
                const newStart = Number(e.target.value);
                let newEnd = Number(modalData.end);
                if (newStart >= newEnd) {
                    newEnd = newStart + 0.5;
                }
                setModalData({ ...modalData, start: newStart, end: newEnd });
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                
                let reqStart = Number(modalData.start);
                let reqEnd = Number(modalData.end);

                if (reqStart >= reqEnd) { 
                    setErrorMsg("เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มต้นค่ะ"); 
                    return; 
                }
                
                // 1. ดึงตารางเรียนเฉพาะวันนั้นมาเพื่อใช้เทียบหาช่องว่าง
                const dayClasses = CLASSES.filter(c => c.day === modalData.day);

                // 2. ลอจิกหั่นเวลา (ข้ามช่วงที่มีเรียน)
                let segments = [{ s: reqStart, e: reqEnd }];

                dayClasses.forEach(c => {
                    let newSegments = [];
                    segments.forEach(seg => {
                        // ถ้าเวลาไม่ทับซ้อนกันเลย ให้เก็บช่วงเวลานี้ไว้เหมือนเดิม
                        if (c.e <= seg.s || c.s >= seg.e) {
                            newSegments.push(seg);
                        } else {
                            // ถ้าทับซ้อน ให้แบ่งช่วงเวลาโดยตัดเวลาเรียนออก
                            if (seg.s < c.s) {
                                newSegments.push({ s: seg.s, e: c.s });
                            }
                            if (c.e < seg.e) {
                                newSegments.push({ s: c.e, e: seg.e });
                            }
                        }
                    });
                    segments = newSegments;
                });

                // หากเวลาที่เลือก ตรงกับเวลาเรียน 100% (ไม่มีเวลาว่างเหลือให้ลง)
                if (segments.length === 0) {
                    setErrorMsg("ช่วงเวลาที่เลือกมีตารางเรียนเต็มหมดแล้วครับ ไม่สามารถลงเวลาได้");
                    return;
                }

                try {
                    // เซฟเวลาแต่ละก้อนที่หั่นแล้วแยกกัน
                    for (let seg of segments) {
                        const newBusy = { 
                            person: modalData.person, 
                            day: modalData.day, 
                            s: seg.s, 
                            e: seg.e, 
                            note: modalData.note 
                        };
                        await window.fbAddDoc(window.fbCollection(window.firebaseDB, "busytimes"), newBusy);
                    }
                    setIsModalOpen(false);
                } catch (error) {
                    setErrorMsg("บันทึกไม่สำเร็จ ตรวจสอบการตั้งค่าฐานข้อมูลครับ");
                    console.error(error);
                }
            };

            const handleDelete = async () => {
                if(!cancelTarget) return;
                try {
                    await window.fbDeleteDoc(window.fbDoc(window.firebaseDB, "busytimes", cancelTarget.id));
                    setCancelTarget(null);
                } catch (error) {
                    console.error(error);
                }
            };

            const toggleItemStatus = (id) => {
                setInventoryStatus(prev => ({

            const checkedCount = Object.values(inventoryStatus).filter(Boolean).length;
            const isAllChecked = checkedCount === LAB_ITEMS.length;

            // ฟังก์ชันสำหรับกดเลือกทั้งหมด หรือยกเลิกทั้งหมด

            };

            const getStatusLabel = (day, time, isEnd = false) => {
                const checkTime = isEnd ? time - 0.5 : time;
                const hasClass = CLASSES.some(c => c.day === day && checkTime >= c.s && checkTime < c.e);
                const hasBusy = busytimes.some(b => b.day === day && checkTime >= b.s && checkTime < b.e);
                
                let labels = [];
                if (hasClass) labels.push("มีเรียน");
                if (hasBusy) labels.push("มีธุระแล้ว");
                
                return labels.length > 0 ? ` (${labels.join(', ')})` : '';
            };

            const getSegmentedClasses = (day) => {
                const dayClasses = CLASSES.filter(c => c.day === day);
                if (dayClasses.length === 0) return [];
                let timePoints = new Set();
                dayClasses.forEach(c => { timePoints.add(c.s); timePoints.add(c.e); });
                let sortedPoints = Array.from(timePoints).sort((a, b) => a - b);
                let segments = [];
                for (let i = 0; i < sortedPoints.length - 1; i++) {
                    let s = sortedPoints[i];
                    let e = sortedPoints[i+1];
                    let activeClasses = dayClasses.filter(c => c.s <= s && c.e >= e);
                    if (activeClasses.length > 0) {
                        segments.push({ s, e, classes: activeClasses, day });
                    }
                }
                return segments;
            };

            const getBlockStyle = (start, end) => {
                const left = ((start - START_HOUR) / TOTAL_HOURS) * 100;
                const width = ((end - start) / TOTAL_HOURS) * 100;
                return { left: `${left}%`, width: `${width}%` };
            };

            const timeOptions = Array.from({length: TOTAL_HOURS * 2 + 1}, (_, i) => START_HOUR + (i * 0.5));

            if(isLoading) {
                return <div className="min-h-screen flex items-center justify-center text-muji-muted font-serif text-xl">กำลังโหลดข้อมูล...</div>
            }

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    
                    <div className="mb-10 text-center pt-4">
                        <h1 className="text-3xl md:text-4xl font-serif text-muji-ink mb-2">
                            {activeTab === 'schedule' ? 'ตารางนัดหมายและเช็คเวลาเรียน' : 'รายการตรวจสอบอุปกรณ์ห้องแลป'}
                        </h1>
                        <p className="text-muji-muted">
                            {activeTab === 'schedule' 
                                ? 'คลิกที่ตารางเพื่อลงเวลาติดธุระ (ระบบจะข้ามเวลาที่มีเรียนให้อัตโนมัติ)'
                                : `มีอุปกรณ์ทั้งหมด ${LAB_ITEMS.length} รายการ (ตรวจสอบแล้ว ${checkedCount}/${LAB_ITEMS.length})`
                            }
                        </p>
                    </div>

                    <div className="w-full transition-all duration-300">
                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-3xl shadow-soft p-3 sm:p-6 border border-muji-line/30">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between px-2 mb-5 gap-3">
                                    <div className="flex gap-5 text-[13px] font-medium">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3.5 h-3.5 rounded bg-muji-classBg border border-[#d4cbb8]"></div>
                                            <span className="text-muji-muted">เวลาเรียน (ฟิกซ์)</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3.5 h-3.5 rounded bg-muji-busyBg border border-[#e6d0a1]"></div>
                                            <span className="text-muji-muted">ติดธุระ (คลิกเพื่อลบ)</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="smooth-scroll overflow-x-auto pb-4">
                                    <div className="min-w-[850px] pr-2">
                                        <div className="relative mb-2 ml-[90px] h-6">
                                            {Array.from({ length: TOTAL_HOURS + 1 }, (_, i) => START_HOUR + i).map(h => (
                                                <div key={h} className="absolute flex flex-col items-center -translate-x-1/2 bottom-0" 
                                                     style={{ left: `${((h - START_HOUR) / TOTAL_HOURS) * 100}%` }}>
                                                    <span className="text-[12px] font-semibold text-muji-muted mb-1">{h}:00</span>
                                                    <div className="w-[1.5px] h-2 bg-muji-line/80"></div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="space-y-3.5">
                                            {DAYS.map((day) => (
                                                <div key={day} className="flex items-stretch h-[72px] group/row relative">
                                                    <div className="w-[80px] shrink-0 flex items-center justify-center font-serif text-muji-ink bg-muji-surface rounded-2xl mr-[10px] border border-muji-line/50 z-30 relative">
                                                        {day}
                                                    </div>
                                                    
                                                    <div className="flex-1 relative flex bg-[#fdfcfb] rounded-2xl overflow-hidden border border-muji-line shadow-inner">
                                                        {HOURS_ARRAY.map((h, i) => (
                                                            <div key={h} onClick={() => handleCellClick(day, h)}
                                                                 className={`flex-1 border-r border-muji-line/70 cursor-pointer hover:bg-muji-surface/60 transition-colors relative grid-cell ${i === HOURS_ARRAY.length - 1 ? 'border-r-0' : ''} z-0`}>
                                                            </div>
                                                        ))}

                                                        {getSegmentedClasses(day).map((seg, i) => {
                                                            const isMulti = seg.classes.length > 1;
                                                            const isAllMembers = !isMulti && seg.classes[0].members.length === MEMBERS.length;
                                                            return (
                                                                <div key={`class-seg-${i}`} 
                                                                     onClick={(e) => { e.stopPropagation(); setClassModalData(seg); }}
                                                                     className={`absolute inset-y-0 bg-muji-classBg text-muji-ink px-3 py-1.5 flex flex-col justify-center cursor-pointer z-10 border-l-[1.5px] border-r border-[#d4cbb8] shadow-sm class-block-hover overflow-hidden`}
                                                                     style={getBlockStyle(seg.s, seg.e)}>
                                                                    
                                                                    {isMulti ? (
                                                                        <div className="text-center w-full">
                                                                            <div className="font-bold text-[12px] truncate text-[#8a5b4c] flex items-center justify-center gap-1">
                                                                                <svg className="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                                                                                <span className="truncate">เวลาตรงกัน</span>
                                                                            </div>
                                                                            <div className="text-[10px] text-muji-muted truncate mt-0.5 w-full">คลิกดูห้องเรียน</div>
                                                                        </div>
                                                                    ) : (
                                                                        <>
                                                                            <div className="flex items-center gap-1 w-full">
                                                                                {isAllMembers ? 
                                                                                    <span className="shrink-0 flex"><svg className="w-3 h-3 text-muji-ink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></span>
                                                                                    : <span className="shrink-0 flex"><svg className="w-3 h-3 text-muji-muted" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd"></path></svg></span>
                                                                                }
                                                                                <div className="font-semibold text-[13px] truncate">{seg.classes[0].code}</div>
                                                                            </div>
                                                                            <div className="text-[11px] text-muji-muted truncate ml-[18px]">{seg.classes[0].room}</div>
                                                                        </>
                                                                    )}
                                                                </div>
                                                            )
                                                        })}

                                                        {busytimes.filter(b => b.day === day).map(b => {
                                                            const member = MEMBERS.find(m => m.id === b.person);
                                                            return (
                                                                <div key={b.id} onClick={(e) => { e.stopPropagation(); setCancelTarget(b); }}
                                                                     className="absolute inset-y-0 bg-muji-busyBg text-muji-busyText px-4 py-2 flex flex-col justify-center z-20 shadow-block cursor-pointer hover:brightness-95 transition-all group/block border-l-2 border-[#d6ba78]"
                                                                     style={getBlockStyle(b.s, b.e)}>
                                                                    <div className="font-semibold text-[13px] truncate w-full flex justify-between items-center">
                                                                        {member?.name.split(' ')[0]}
                                                                        <svg className="w-3.5 h-3.5 opacity-0 group-hover/block:opacity-100 transition-opacity shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                                    </div>
                                                                    <div className="text-[11px] opacity-90 truncate w-full mt-0.5">{b.note || 'ติดธุระ'}</div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="bg-white rounded-3xl shadow-soft p-4 sm:p-6 border border-muji-line/30">
                                
                                {/* ส่วนหัวของแท็บ เช็คอุปกรณ์ และปุ่ม เลือกทั้งหมด/ยกเลิกทั้งหมด */}
                                <div className="flex justify-between items-center mb-6 pb-4 border-b border-muji-line/40">
                                    <h2 className="font-serif text-lg md:text-xl text-muji-ink">
                                        สถานะ: <span className={isAllChecked ? "text-[#4b6a52] font-semibold" : "text-muji-muted"}>{isAllChecked ? 'ครบถ้วนสมบูรณ์' : 'ยังไม่ครบ'}</span>
                                    </h2>
                                    <button 
                                        onClick={toggleAllItems} 
                                        className={`px-4 py-2 rounded-xl text-[13px] font-medium transition-all shadow-sm flex items-center gap-2 ${
                                            isAllChecked 
                                            ? 'bg-red-50 text-red-600 border border-red-200 hover:bg-red-100' 
                                            : 'bg-muji-surface text-muji-ink border border-muji-line/60 hover:bg-[#e9e4d6]'
                                        }`}>
                                        {isAllChecked ? (
                                            <><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg> ยกเลิกทั้งหมด</>
                                        ) : (
                                            <><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> เลือกครบทั้งหมด</>
                                        )}
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {LAB_ITEMS.map((item) => {
                                        const isChecked = inventoryStatus[item.id] || false;
                                        return (
                                            <div key={item.id} className={`flex flex-col justify-between p-4 rounded-2xl border transition-all duration-200 ${isChecked ? 'bg-[#f4f6f3] border-[#ccd8ca]' : 'bg-muji-bg border-muji-line/40'}`}>
                                                <div className="mb-4">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-[11px] font-bold text-muji-muted bg-muji-surface px-2 py-0.5 rounded-md border border-muji-line/50">{item.id}</span>
                                                        <span className="text-[11px] text-muji-muted">{item.category}</span>
                                                    </div>
                                                    <h3 className="font-semibold text-[15px] text-muji-ink mb-1">{item.name}</h3>
                                                    <div className="text-[13px] text-muji-muted space-y-1">
                                                        <p>จำนวน: <span className="text-muji-ink font-medium">{item.qty} {item.unit}</span> {item.size !== '-' && `(ขนาด: ${item.size})`}</p>
                                                        <p>ที่เก็บ: <span className="text-muji-ink">{item.location}</span></p>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center justify-between pt-3 border-t border-muji-line/30">
                                                    <span className={`text-[13px] font-medium ${isChecked ? 'text-[#4b6a52]' : 'text-muji-muted'}`}>
                                                        {isChecked ? 'ตรวจสอบแล้ว (ครบ)' : 'ยังไม่ตรวจสอบ'}
                                                    </span>
                                                    
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" className="sr-only peer" checked={isChecked} onChange={() => toggleItemStatus(item.id)} />
                                                        <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#5c4f41]"></div>
                                                    </label>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full bg-white border-t border-muji-line/30 shadow-nav z-40 pb-safe">
                        <div className="max-w-md mx-auto flex">
                            <button 
                                onClick={() => setActiveTab('schedule')}
                                className={`flex-1 py-4 flex flex-col items-center gap-1 transition-colors relative ${activeTab === 'schedule' ? 'text-muji-ink' : 'text-muji-muted hover:text-muji-ink/70'}`}>
                                {activeTab === 'schedule' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1 bg-muji-ink rounded-b-md"></div>}
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span className="text-[12px] font-medium">ตารางเรียน</span>
                            </button>
                            
                            <button 
                                onClick={() => setActiveTab('inventory')}
                                className={`flex-1 py-4 flex flex-col items-center gap-1 transition-colors relative ${activeTab === 'inventory' ? 'text-muji-ink' : 'text-muji-muted hover:text-muji-ink/70'}`}>
                                {activeTab === 'inventory' && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1 bg-muji-ink rounded-b-md"></div>}
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                <span className="text-[12px] font-medium">เช็คไอเทม</span>
                            </button>
                        </div>
                    </div>

                    {classModalData && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-muji-ink/20 modal-overlay-enter backdrop-blur-sm" onClick={() => setClassModalData(null)}>
                            <div className="bg-white rounded-[24px] shadow-xl w-full max-w-[420px] p-6 modal-enter relative border border-muji-line/30" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setClassModalData(null)} className="absolute top-4 right-4 text-muji-muted hover:text-muji-ink bg-muji-surface rounded-full p-1.5 transition-colors">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                
                                <div className="mb-5 flex items-center gap-3 border-b border-muji-line/40 pb-3">
                                    <div className="w-10 h-10 rounded-full bg-muji-classBg text-muji-ink flex items-center justify-center border border-[#d4cbb8]">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                    </div>
                                    <div>
                                        <h2 className="font-serif text-xl text-muji-ink">ข้อมูลตารางเรียน</h2>
                                        <p className="text-[13px] text-muji-muted">วัน{classModalData.day} ({formatTime(classModalData.s)} - {formatTime(classModalData.e)} น.)</p>
                                    </div>
                                </div>

                                <div className="space-y-4 max-h-[60vh] overflow-y-auto smooth-scroll pr-1">
                                    {classModalData.classes.length === 1 && classModalData.classes[0].members.length === MEMBERS.length ? (
                                        <div className="bg-[#f0f7f2] rounded-xl p-4 border border-[#cce6d3] text-center">
                                            <div className="inline-flex bg-green-500 text-white text-[12px] font-bold px-3 py-1 rounded-full mb-3 shadow-sm">
                                                เรียนพร้อมกันทั้ง 3 คน ✅
                                            </div>
                                            <div className="font-bold text-lg text-muji-ink mb-1">{classModalData.classes[0].code}</div>
                                            <div className="text-sm text-[#4b6a52] flex items-center justify-center gap-1.5 font-medium">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                                ห้อง {classModalData.classes[0].room}
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <div className="text-[13px] font-semibold text-muji-muted mb-3 flex items-center gap-2">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                                รายชื่อและสถานที่เรียน
                                            </div>
                                            <div className="space-y-3">
                                                {classModalData.classes.map((c, idx) => {
                                                    const isTogether = c.members.length > 1;
                                                    return (
                                                        <div key={idx} className="bg-muji-surface/50 rounded-xl p-3 border border-muji-line/40 flex flex-col gap-2">
                                                            <div className="flex gap-2 flex-wrap items-center">
                                                                {c.members.map(m => {
                                                                    const member = MEMBERS.find(x => x.id === m);
                                                                    return <span key={m} className="bg-white border border-muji-line/60 shadow-sm px-2.5 py-1 rounded-md text-[12.5px] font-medium text-muji-ink">{member.short}</span>
                                                                })}
                                                                {isTogether && <span className="text-[11px] text-green-600 bg-green-100 px-2 py-0.5 rounded font-bold ml-1">เรียนด้วยกัน ✅</span>}
                                                            </div>
                                                            <div className="flex items-center justify-between mt-1 px-2 bg-white/60 rounded-lg py-2 border border-white">
                                                                <span className="font-bold text-[13px] text-[#8a5b4c]">{c.code}</span>
                                                                <span className="text-[12.5px] text-muji-muted flex items-center gap-1 font-medium">
                                                                    <svg className="w-3.5 h-3.5 text-[#8a5b4c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                                                                    {c.room}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-muji-ink/10 modal-overlay-enter backdrop-blur-sm">
                            <div className="bg-white rounded-[24px] shadow-xl w-full max-w-[420px] p-6 sm:p-8 modal-enter relative border border-muji-line/30">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-5 right-5 text-muji-muted hover:text-muji-ink bg-muji-surface rounded-full p-1.5 transition-colors">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                <div className="mb-6">
                                    <h2 className="font-serif text-2xl text-muji-ink mb-1">ลงเวลาติดธุระ</h2>
                                    <p className="text-muji-muted text-[13.5px]">ระบบจะทำการแยกเวลาและข้ามชั่วโมงเรียนให้อัตโนมัติ สามารถเลือกลงเวลายาวๆ ได้เลย</p>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    {errorMsg && <div className="text-[13px] text-red-600 bg-red-50/80 p-3 rounded-xl flex items-start gap-2">{errorMsg}</div>}
                                    <div>
                                        <label className="block text-[13px] font-medium text-muji-muted mb-1.5 ml-1">ชื่อของคุณ</label>
                                        <select value={modalData.person} onChange={e => setModalData({...modalData, person: e.target.value})} className="w-full bg-muji-surface text-muji-ink rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-muji-accent/40 minimal-input transition-shadow">
                                            {MEMBERS.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="block text-[13px] font-medium text-muji-muted mb-1.5 ml-1">วัน</label>
                                            <div className="w-full bg-muji-surface/50 text-muji-muted rounded-xl px-4 py-3 cursor-not-allowed">{modalData.day}</div>
                                        </div>
                                        <div className="flex-[2] flex gap-3">
                                            <div className="flex-1">
                                                <label className="block text-[13px] font-medium text-muji-muted mb-1.5 ml-1">ตั้งแต่</label>
                                                <select value={modalData.start} onChange={handleStartChange} className="w-full bg-muji-surface text-muji-ink rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-muji-accent/40 minimal-input text-[14px]">
                                                    {timeOptions.slice(0, -1).map(t => (
                                                        <option key={`s-${t}`} value={t}>{formatTime(t)}{getStatusLabel(modalData.day, t, false)}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-[13px] font-medium text-muji-muted mb-1.5 ml-1">ถึง</label>
                                                <select value={modalData.end} onChange={e => setModalData({...modalData, end: e.target.value})} className="w-full bg-muji-surface text-muji-ink rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-muji-accent/40 minimal-input text-[14px]">
                                                    {/* แก้บักการเลือกเวลา: แสดงเฉพาะเวลาสิ้นสุดที่มากกว่าเวลาเริ่มต้น */}
                                                    {timeOptions.filter(t => t > Number(modalData.start)).map(t => (
                                                        <option key={`e-${t}`} value={t}>{formatTime(t)}{getStatusLabel(modalData.day, t, true)}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-medium text-muji-muted mb-1.5 ml-1">รายละเอียด (ถ้ามี)</label>
                                        <input type="text" value={modalData.note} onChange={e => setModalData({...modalData, note: e.target.value})} placeholder="เช่น นัดอาจารย์..." className="w-full bg-muji-surface text-muji-ink rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-muji-accent/40 transition-shadow placeholder:text-muji-muted/60" />
                                    </div>
                                    <div className="pt-3 flex gap-3">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-[1] text-muji-ink bg-transparent hover:bg-muji-surface rounded-xl py-3 font-medium transition-colors">ยกเลิก</button>
                                        <button type="submit" className="flex-[2] text-white bg-muji-ink hover:bg-[#4a3f35] rounded-xl py-3 font-medium transition-colors shadow-soft">บันทึกเวลา</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {cancelTarget && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-muji-ink/10 modal-overlay-enter backdrop-blur-sm">
                            <div className="bg-white rounded-[24px] shadow-xl w-full max-w-[340px] p-6 text-center modal-enter relative border border-muji-line/30">
                                <div className="w-12 h-12 bg-red-50 text-red-400 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </div>
                                <h3 className="font-serif text-xl text-muji-ink mb-2">ยกเลิกเวลานี้ใช่ไหม?</h3>
                                <p className="text-[14px] text-muji-muted mb-6">
                                    คุณต้องการลบเวลาติดธุระของ <strong className="text-muji-ink font-semibold">{MEMBERS.find(m => m.id === cancelTarget.person)?.name.split(' ')[0]}</strong><br/>
                                    ช่วง {formatTime(cancelTarget.s)} - {formatTime(cancelTarget.e)} น.
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setCancelTarget(null)} className="flex-1 text-muji-ink bg-muji-surface hover:bg-muji-line/50 rounded-xl py-2.5 font-medium transition-colors">ปิด</button>
                                    <button onClick={handleDelete} className="flex-1 text-white bg-red-500 hover:bg-red-600 rounded-xl py-2.5 font-medium transition-colors shadow-soft">ยืนยันการลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }
 
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
